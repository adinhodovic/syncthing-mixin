# yamllint disable rule:line-length
rule_files:
  - ../prometheus_alerts.yaml

tests:
  - interval: 1m
    input_series:
      - series: 'syncthing_events_total{cluster="test-cluster", job="syncthing", event="FolderCompletion", state="dropped"}'
        values: "0+1x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: SyncthingEventsDropped
        exp_alerts:
          - exp_labels:
              cluster: test-cluster
              job: syncthing
              event: FolderCompletion
              severity: warning
            exp_annotations:
              summary: "Syncthing events dropped."
              description: "The job syncthing has dropped events of type FolderCompletion in the last minute."
              dashboard_url: "https://grafana.com/d/syncthing-overview-jkwq/syncthing-overview?var-job=syncthing"
  - interval: 1m
    input_series:
      - series: 'syncthing_model_folder_summary{cluster="test-cluster", job="syncthing", folder="Documents", scope="need", type="bytes"}'
        values: "1000+0x80"
    alert_rule_test:
      - eval_time: 65m
        alertname: SyncthingFolderOutOfSync
        exp_alerts:
          - exp_labels:
              cluster: test-cluster
              job: syncthing
              folder: Documents
              severity: info
            exp_annotations:
              summary: "Syncthing folder out of sync."
              description: "The folder Documents in job syncthing is out of sync for more than 1h."
              dashboard_url: "https://grafana.com/d/syncthing-overview-jkwq/syncthing-overview?var-job=syncthing&var-folder=Documents"
